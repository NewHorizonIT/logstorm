receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
processors:
  batch:
    send_batch_size: 1000
    timeout: 5s

  filter/drop_noise:
    logs:
      exclude:
        match_type: regexp
        bodies:
          - ".*health.*"
          - ".*ping.*"

  transform/enrich:
    log_statements:
      - context: log
        statements:
          - set(time, Now()) where time == nil

exporters:
  kafka:
    brokers: ["redpanda:9092"]
    topic: service-logs
    encoding: otlp_json

  kafka/dead_letter:
    brokers: ["redpanda:9092"]
    topic: dead-letter-logs
    encoding: otlp_json

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch, filter/drop_noise, transform/enrich]
      exporters: [kafka]
