app:
  environment: test

database:
  driver: postgres
  host: localhost
  port: 5432
  username: postgres
  password: postgres
  name: logstorm
  max_open_conns: 10
  max_idle_conns: 5

clickhouse:
  host: localhost
  http_port: 8123
  native_port: 9000
  username: default
  database: logstorm

logging:
  level: info
  format: console
  output: both
  environment: development

  console_enabled: true

  file_enabled: true
  file_path: logs/app.log

  rotation_enabled: true
  rotation_max_size: 100
  rotation_max_age: 30
  rotation_max_backups: 7

  compression_enabled: true

auth:
  jwt_secret: "12345678901234567890123456789012"
  access_token_ttl: 15m
  refresh_token_ttl: 168h

cors:
  allowed_origins:
    - "*"

  allowed_methods:
    - GET

  allowed_headers:
    - Content-Type